name: Keep Actions Alive

on:
  schedule:
    - cron: '0 0 * * 0'  # Sonntags 00:00 UTC — weit weg von der 06:07-Spitze
  workflow_dispatch:

permissions:
  actions: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v2
