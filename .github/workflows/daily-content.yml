name: Daily Content

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      thema:
        description: 'Evergreen-Thema erzwingen (leer = aktueller News-Lauf)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Content generieren + Telegram senden
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          INPUT_THEMA: ${{ github.event.inputs.thema }}
        run: python scripts/content_machine.py
