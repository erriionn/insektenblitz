name: Post Approval Check

# Nur noch MANUELL (Notfall-Wiederherstellung). Seit dem Telegram-Webhook
# (Option B) werden Approve/Reject sofort verarbeitet; der 15-Min-Cron ist
# abgeschaltet, damit Polling nicht mit dem Webhook kollidiert (Telegram
# erlaubt nicht getUpdates UND Webhook gleichzeitig -> 409). Bei Webhook-/
# Netlify-Ausfall: erst `python scripts/set_webhook.py delete`, dann hier
# "Run workflow" klicken.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Approve/Reject pruefen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          # Noetig fuer /neuerpost: telegram_check startet dann content_machine,
          # das den KI-Schluessel zur Generierung braucht.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/telegram_check.py
